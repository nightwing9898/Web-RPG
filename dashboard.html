{% extends "layout.html" %}
{% block content %}
  <div class="card">
    <h1>{{ player }} 的冒險者控制台</h1>
    <p>你的餘額：<strong id="balance-display">{{ account_data.balance }} 元</strong></p>
    <p>幸運加成：<strong id="luck-status">{{ '有效' if account_data.luck_active else '無效' }}</strong></p>
    <p>背包：<span id="backpack-display">{{ account_data.backpack | join('、') if account_data.backpack else '空無一物' }}</span></p>
    <div>
      <button class="button" id="refresh-btn">重新整理狀態</button>
      <a class="button danger" href="{{ url_for('logout') }}">登出</a>
    </div>
  </div>

  <div id="message-card" class="card" style="display:none;"></div>

  <div class="card">
    <h2>快速操作</h2>
    <div class="grid-row">
      <button class="button" id="work-btn">打工賺 100 元</button>
      <button class="button" id="fight-btn">打怪賺錢</button>
      <button class="button" id="boss-btn">挑戰 BOSS</button>
    </div>
    <form id="slots-form" class="section-form">
      <label for="slots-amount">老虎機押注金額</label>
      <input id="slots-amount" name="amount" type="number" min="1" placeholder="輸入押注金額" required />
      <button class="button" type="submit">玩老虎機</button>
    </form>
  </div>

  <div class="card">
    <h2>商店購買</h2>
    <form id="buy-form">
      <label for="buy-item">選擇道具</label>
      <select id="buy-item" name="item_name"></select>
      <label for="buy-quantity">購買數量</label>
      <input id="buy-quantity" name="quantity" type="number" min="1" value="1" required />
      <button class="button" type="submit">購買</button>
    </form>
  </div>

  <div class="card">
    <h2>使用道具</h2>
    <form id="use-form">
      <label for="use-item">選擇要使用的道具</label>
      <select id="use-item" name="item_name"></select>
      <button class="button" type="submit">使用</button>
    </form>
  </div>

  <div class="card">
    <h2>送禮給朋友</h2>
    <form id="gift-form">
      <label for="gift-target">對方暱稱</label>
      <input id="gift-target" name="target_name" placeholder="輸入朋友的暱稱" required />
      <label for="gift-item">選擇道具</label>
      <select id="gift-item" name="item_name"></select>
      <label for="gift-quantity">送出數量</label>
      <input id="gift-quantity" name="quantity" type="number" min="1" value="1" required />
      <button class="button" type="submit">送出</button>
    </form>
  </div>

  <script>
    const accountData = {{ account_data|tojson }};
    const shopItems = {{ shop_items|tojson }};

    const balanceDisplay = document.getElementById('balance-display');
    const backpackDisplay = document.getElementById('backpack-display');
    const luckStatus = document.getElementById('luck-status');
    const messageCard = document.getElementById('message-card');
    const refreshBtn = document.getElementById('refresh-btn');
    const workBtn = document.getElementById('work-btn');
    const fightBtn = document.getElementById('fight-btn');
    const slotsForm = document.getElementById('slots-form');
    const buyForm = document.getElementById('buy-form');
    const useForm = document.getElementById('use-form');
    const giftForm = document.getElementById('gift-form');
    const buyItem = document.getElementById('buy-item');
    const useItem = document.getElementById('use-item');
    const giftItem = document.getElementById('gift-item');

    function showMessage(text, type='info') {
      messageCard.style.display = 'block';
      messageCard.textContent = text;
      messageCard.className = 'card flash ' + type;
    }

    function updateStatus(data) {
      balanceDisplay.textContent = `${data.balance} 元`;
      luckStatus.textContent = data.luck_active ? '有效' : '無效';
      backpackDisplay.textContent = data.backpack.length ? data.backpack.join('、') : '空無一物';
      populateItemSelectors(data.backpack);
    }

    function populateItemSelectors(backpack) {
      const uniqueItems = [...new Set(backpack)];
      [useItem, giftItem].forEach(select => {
        select.innerHTML = uniqueItems.length
          ? uniqueItems.map(item => `<option value="${item}">${item}</option>`).join('')
          : '<option value="">無可使用道具</option>';
      });
    }

    function populateShopItems() {
      buyItem.innerHTML = Object.keys(shopItems).map(item => `
        <option value="${item}">${shopItems[item][2]} ${item} - ${shopItems[item][0]} 元</option>
      `).join('');
    }

    async function postJson(url, data) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return await response.json();
    }

    async function refreshAccount() {
      const response = await fetch('/api/status');
      const data = await response.json();
      if (data.success) {
        updateStatus(data.account);
      } else {
        showMessage(data.message, 'danger');
      }
    }

    workBtn.addEventListener('click', async () => {
      const data = await postJson('/api/work', {});
      showMessage(data.message, data.success ? 'success' : 'danger');
      if (data.success) updateStatus(data.account);
    });

    fightBtn.addEventListener('click', async () => {
      const data = await postJson('/api/fight', {});
      showMessage(data.message, data.success ? 'success' : 'warning');
      if (data.account) updateStatus(data.account);
    });

    const bossBtn = document.getElementById('boss-btn');
    bossBtn.addEventListener('click', async () => {
      const data = await postJson('/api/boss', {});
      showMessage(data.message, data.success ? 'success' : 'danger');
      if (data.account) updateStatus(data.account);
    });

    slotsForm.addEventListener('submit', async event => {
      event.preventDefault();
      const amount = document.getElementById('slots-amount').value;
      const data = await postJson('/api/slots', { amount });
      showMessage(data.message, data.success ? 'success' : 'danger');
      if (data.success) updateStatus(data.account);
    });

    buyForm.addEventListener('submit', async event => {
      event.preventDefault();
      const item_name = buyItem.value;
      const quantity = document.getElementById('buy-quantity').value;
      const data = await postJson('/api/buy', { item_name, quantity });
      showMessage(data.message, data.success ? 'success' : 'danger');
      if (data.success) updateStatus(data.account);
    });

    useForm.addEventListener('submit', async event => {
      event.preventDefault();
      const item_name = useItem.value;
      const data = await postJson('/api/use', { item_name });
      showMessage(data.message, data.success ? 'success' : 'danger');
      if (data.success) updateStatus(data.account);
    });

    giftForm.addEventListener('submit', async event => {
      event.preventDefault();
      const target_name = document.getElementById('gift-target').value;
      const item_name = giftItem.value;
      const quantity = document.getElementById('gift-quantity').value;
      const data = await postJson('/api/gift', { target_name, item_name, quantity });
      showMessage(data.message, data.success ? 'success' : 'danger');
      if (data.success) updateStatus(data.account);
    });

    refreshBtn.addEventListener('click', async () => {
      await refreshAccount();
      showMessage('已更新玩家狀態。', 'info');
    });

    populateShopItems();
    populateItemSelectors(accountData.backpack);
  </script>
{% endblock %}
