{% extends "layout.html" %}
{% block content %}
  <div class="card">
    <h1>送禮給其他冒險者</h1>
    {% if choices %}
      <form method="post" action="{{ url_for('gift') }}">
        <label for="target_name">對方暱稱</label>
        <input id="target_name" name="target_name" placeholder="輸入朋友的暱稱" required />
        <label for="item_name">選擇要送出的道具</label>
        <select id="item_name" name="item_name">
          {% for item in choices %}
            <option value="{{ item }}">{{ item }}</option>
          {% endfor %}
        </select>
        <label for="quantity">送出數量</label>
        <input id="quantity" name="quantity" type="number" min="1" value="1" required />
        <input class="button" type="submit" value="送禮" />
      </form>
    {% else %}
      <p>你的背包目前沒有可以送出的道具。</p>
    {% endif %}
    <a class="button" href="{{ url_for('dashboard') }}">回到控制台</a>
  </div>
{% endblock %}
