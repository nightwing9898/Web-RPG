{% extends "layout.html" %}
{% block content %}
  <div class="card">
    <h1>{{ player }} 的錢包</h1>
    <p>目前餘額：<strong>{{ account.balance }} 元</strong></p>
    <table>
      <tr><th>背包內容</th><td>{{ account.backpack | join('、') if account.backpack else '背包空空如也...' }}</td></tr>
      <tr><th>最後打工時間</th><td>{{ account.last_work or '尚未打工' }}</td></tr>
    </table>
    <a class="button" href="{{ url_for('dashboard') }}">回到控制台</a>
  </div>
{% endblock %}
